title: "Ō Wairoa Whānau"
description: "He pae tukutuku mō te rōpū waiata o Ō Wairoa Marae"
url: "https://owairoawhanau.co.nz"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM

permalink: pretty

collections:
  waiata:
    output: true
    permalink: /waiata/:slug/
  resources:
    output: true
    permalink: /resources/:slug/
  featured_events:
    output: true
    permalink: /calendar/featured-events/:slug/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "waiata"
    values:
      layout: waiata
  - scope:
      path: ""
      type: "featured_events"
    values:
      layout: post

google_calendar:
  id: "c_135be84f9af8db2cf3f25fad81c2cebeae12b25e8281480aa737a95ce54f54c0@group.calendar.google.com"
  months_ahead: 12
  max_events: 100
  # Uses the public ICS feed; no API key is needed for a public calendar.

plugins: []

exclude:
  - README.md

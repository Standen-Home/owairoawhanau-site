<article class="waiata-card" data-waiata-card
  data-title="{{ waiata.title | escape }}"
  data-keywords="{{ waiata.keywords | default: '' | escape }}"
  data-category="{{ waiata.category | default: '' | escape }}"
  data-tags="{{ waiata.tags | join: ',' | escape }}">

  <h3><a href="{{ waiata.url | relative_url }}">{{ waiata.title }}</a></h3>

  <div class="waiata-meta">
    {% if waiata.category %}
      <span class="badge">{{ waiata.category }}</span>
    {% endif %}
    {% for t in waiata.tags %}
      <span class="badge">{{ t }}</span>
    {% endfor %}
    {% if waiata.difficulty %}
      <span class="badge">{{ waiata.difficulty }}</span>
    {% endif %}
  </div>
</article>

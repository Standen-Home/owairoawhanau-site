<footer class="site-footer">
  <div class="container">
    <p class="footer-mi">{{ site.data.site-settings.site_note }}</p>
    {% if site.data.site-settings.site_note_en %}
      <p class="footer-en">{{ site.data.site-settings.site_note_en }}</p>
    {% endif %}
    <p class="footer-note">Whānau-led, marae-supported, unofficial website for Waiata Wednesday Rōpū.</p>
    <div class="footer-actions">
      <button class="btn btn-primary" type="button" data-klaviyo-form="XGX9qF">Newsletter Sign Up</button>
    </div>
    <p class="footer-meta">&copy; {{ site.time | date: '%Y' }} {{ site.title }}.</p>
  </div>
</footer>

<script src="{{ '/assets/js/modal.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/klaviyo.js' | relative_url }}" defer></script>

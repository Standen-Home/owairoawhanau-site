---
layout: default
---
<section class="hero">
  <div class="hero-box">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.title_en %}
      <div class="page-title-en">{{ page.title_en }}</div>
    {% endif %}
    <p><span class="badge">{{ page.date | date: "%d %b %Y" }}</span></p>
  </div>
</section>

<article class="prose">
  {{ content }}
</article>
